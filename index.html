<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сад для тебя...</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="garden">
    <h1>Ухаживай за моим садом...</h1>
    <p class="subtitle">Кликай на цветочки, чтобы они расцвели ❤️</p>

    <div class="flowers-container" id="flowers"></div>

    <!-- Финальный большой цветок -->
    <div class="final-flower-container" id="finalContainer">
        <img
                src="assets/images/final-flower.png"
                class="big-flower"
                id="finalFlower"
                alt="Большой цветок"
        >

        <div class="final-text" id="finalText">
            <h2>Ксения, ты мне нравишься ❤️</h2>
            <p id="finalMessage">вот такой сайтик))</p>
        </div>
    </div>
    <h1>created by leoneed</h1>
</div>

<!-- Сообщение при поливе цветка -->
<div class="message" id="messageBox">
    <p id="messageText"></p>
</div>

<script src="js/main.js"></script>
</body>
</html>
